services:
  app:
    env_file:
      - .env.docker
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    command: >
      sh -c "composer install --no-interaction --prefer-dist --no-progress &&
      php artisan key:generate --force >/dev/null 2>&1 || true &&
      php artisan migrate --force || true &&
      php artisan serve --host=0.0.0.0 --port=8000"

  postgres:
    env_file:
      - .env.docker
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-wallet} -d ${DB_DATABASE:-wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
