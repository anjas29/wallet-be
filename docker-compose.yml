services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-be-app
    working_dir: /var/www/html
    # NOTE: intentionally no `env_file` here. Laravel reads the mounted .env file directly;
    # injecting it as OS env vars would override phpunit.xml's test config (force included),
    # causing the test suite to run RefreshDatabase against the real Postgres DB.
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: wallet-be-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: wallet-be-postgres
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres-data:

networks:
  internal:
    driver: bridge