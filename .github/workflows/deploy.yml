name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Dedicated Postgres for the test run. phpunit.xml forces the suite onto
    # DB_CONNECTION=pgsql / DB_DATABASE=wallet_testing, so CI must provide it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wallet_testing
          POSTGRES_USER: wallet
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wallet -d wallet_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # host/user/pass are not forced by phpunit.xml, so supply them here.
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: wallet
      DB_PASSWORD: secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_pgsql, tokenizer, xml, curl, intl, bcmath, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git pull origin main
            cd ${{ secrets.VPS_DOCKER_COMPOSE_PATH }}
            # docker compose up -d --build --remove-orphans
            docker compose up -d
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize:clear
